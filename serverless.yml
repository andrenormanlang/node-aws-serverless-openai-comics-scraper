service: wingednews-api

# NOTE: Detta gör att varje handler hamnar i en egen bundle. Mycket snabbare och mer
# effektivt, väl värt det. Men det går långsammare att 'bundla' under utveckling,
# så ha det avstängt under utveckling kanske?
# Create an optimized package for our functions
package:
    individually: false

# Use the serverless-webpack plugin to transpile ES6
plugins:
    - serverless-bundle
    - serverless-offline
    - serverless-dynamo-stream-plugin

custom:
    # Use the --stage CLI flag if it was provided, else the fallback stage in provider section
    stage: ${opt:stage, self:provider.stage}
    # Use the --region CLI flag if it was provied, else the fallback region in provider section
    region: ${opt:region, self:provider.region}

    # Set the table name here so we can use it while testing locally
    snsTopicNamePrefix: ${self:custom.stage}-
    tableName: ${self:custom.stage}-wingednews

    # Base prefix for SNS topic ARNs, scoped to the deployed region and account.
    # Append the topic name to form a full ARN, e.g. ${snsTopicArnPrefix}:my-topic
    snsTopicArnPrefix: arn:aws:sns:${self:custom.region}:${aws:accountId}

    # GPT model configuration (pass-through from CLI, defaults are in defs.js)
    gptModelTitle: ${opt:gptModelTitle, ''}
    gptModelShort: ${opt:gptModelShort, ''}
    gptModelLong: ${opt:gptModelLong, ''}
    gptTokenThreshold: ${opt:gptTokenThreshold, ''}

    serverless-offline:
        host: "0.0.0.0"

    # Add the bundle section to exclude re2
    bundle:
        sourcemaps: true
        caching: true
        forceExclude:
            - re2 # Explicitly exclude the re2 package

provider:
    name: aws
    runtime: nodejs16.x
    stage: dev
    region: eu-central-1
    memorySize: 1024 # Overwrite the default memory size. Default is 1024. We can probably even lower it to 256
    lambdaHashingVersion: 20200924

    deploymentBucket:
        name: wingednews-serverless-deploys
        serverSideEncryption: AES256

    # These environment variables are made available to our functions
    # under process.env.
    environment:
        tableName: ${self:custom.tableName}

        snsTopicArnPrefix: ${self:custom.snsTopicArnPrefix}
        snsTopicNamePrefix: ${self:custom.snsTopicNamePrefix}
        userPoolId:
            Ref: CognitoUserPool

        GPT_MODEL_TITLE: ${self:custom.gptModelTitle}
        GPT_MODEL_SHORT: ${self:custom.gptModelShort}
        GPT_MODEL_LONG: ${self:custom.gptModelLong}
        GPT_TOKEN_THRESHOLD: ${self:custom.gptTokenThreshold}

    # 'iamRoleStatements' defines the permission policy for the Lambda function.
    # In this case Lambda functions are granted with permissions to access DynamoDB.
    iamRoleStatements:
        - Effect: Allow
          Action:
              - dynamodb:DescribeTable
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:BatchWriteItem
              - dynamodb:BatchGetItem
              - dynamodb:UpdateTimeToLive
          Resource: "arn:aws:dynamodb:${self:custom.region}:*:*"

        - Effect: Allow
          Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
          Resource: "arn:aws:dynamodb:${self:custom.region}:*:*/stream/*"

          # - { "Fn::GetAtt": ["WingedNewsTable", "Arn" ] }
          # - { "Fn::Join": [ "/", [
          #     { "Fn::GetAtt": ["WingedNewsTable", "Arn" ] }, "index", "sortKey-amount-index"
          #   ]]}
        - Effect: Allow
          Action:
              - SNS:Publish
          Resource: "arn:aws:sns:${self:custom.region}:*:*"

        # 👇 Add this block for Cognito user deletion
        - Effect: Allow
          Action:
              - cognito-idp:AdminDeleteUser
              - cognito-idp:ListUsers
          Resource: "*"

functions:
    # Defines an HTTP API endpoint that calls the main function in create.js
    # - path: url path is /notes
    # - method: POST request
    # - cors: enabled CORS (Cross-Origin Resource Sharing) for browser cross
    #     domain api call
    # - authorizer: authenticate using the AWS IAM role
    add_articles:
        handler: src/functions/add_articles.main
        events:
            - schedule: rate(15 minutes)
    data_scrapping_node:
        handler: src/functions/data_scrapping_node.main
        timeout: 300
        events:
            - schedule: rate(15 minutes)
    #
    # Fetching the article stream
    #
    get:
        handler: src/handlers/get.main
        events:
            - http:
                  path: wingednews/{url}
                  method: get
                  cors: true
                  authorizer: aws_iam
    #
    # Set / get user profile
    #
    set_profile:
        handler: src/handlers/set_profile.main
